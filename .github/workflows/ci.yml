name: CI

# Runs the source repository's test/build CI on this repo's (unmetered) public
# runners. Triggered by a repository_dispatch from the source repo on pushes
# and pull requests; each job reports a commit status back to the source repo
# so checks still show up there.
#
# Requires the MAGRITTE_SOURCE_TOKEN secret: a fine-grained PAT with read
# access to the source repository's contents and write access to its commit
# statuses.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Source commit to test"
        required: true
  repository_dispatch:
    types: [ci]

env:
  SOURCE_REPOSITORY: lyallcooper/magritte
  SOURCE_SHA: ${{ github.event.client_payload.sha || github.event.inputs.sha }}

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: lyallcooper/magritte
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
      - uses: jdx/mise-action@v4
      - run: cargo test
      - run: cargo build --release -p magritte
      - name: Report status to source repo
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          gh api "repos/$SOURCE_REPOSITORY/statuses/$SOURCE_SHA" \
            -f state="$STATE" -f context="CI / macOS" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  linux:
    name: Linux (best effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          repository: lyallcooper/magritte
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
      - name: Install GPUI Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake curl gcc g++ git jq lld llvm make \
            libasound2-dev libfontconfig-dev libglib2.0-dev libssl-dev \
            libva-dev libvulkan1 libwayland-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libzstd-dev pipewire xdg-desktop-portal
      - uses: jdx/mise-action@v4
      - run: cargo test
      - run: cargo build --release -p magritte
      - name: Report status to source repo
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          gh api "repos/$SOURCE_REPOSITORY/statuses/$SOURCE_SHA" \
            -f state="$STATE" -f context="CI / Linux (best effort)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
