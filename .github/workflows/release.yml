name: Release

# Builds release artifacts from the (private) source repository and publishes
# them as a release on this repo, then updates Formula/magritte.rb. Triggered
# by a repository_dispatch from the source repo's tag-push workflow, or
# manually via workflow_dispatch.
#
# Requires the MAGRITTE_SOURCE_TOKEN secret: a fine-grained PAT with read
# access to the source repository's contents.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Source tag to build (e.g. v0.4.0)"
        required: true
  repository_dispatch:
    types: [release]

permissions:
  contents: write

env:
  SOURCE_REPOSITORY: lyallcooper/magritte
  TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}

jobs:
  macos:
    name: macOS artifact
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: lyallcooper/magritte
          ref: ${{ env.TAG }}
          token: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
      - uses: jdx/mise-action@v4
      - name: Build .app archive
        env:
          MAGRITTE_TARGET: aarch64-apple-darwin
        run: scripts/dist-macos.sh "${TAG#v}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            target/dist/*.tar.gz
            target/dist/*.sha256

  linux:
    name: Linux artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: lyallcooper/magritte
          ref: ${{ env.TAG }}
          token: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
      - name: Install GPUI Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake curl gcc g++ git jq lld llvm make \
            libasound2-dev libfontconfig-dev libglib2.0-dev libssl-dev \
            libva-dev libvulkan1 libwayland-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libzstd-dev pipewire xdg-desktop-portal
      - uses: jdx/mise-action@v4
      - name: Build Linux archive
        env:
          MAGRITTE_TARGET: x86_64-unknown-linux-gnu
        run: scripts/dist-linux.sh "${TAG#v}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            target/dist/*.tar.gz
            target/dist/*.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [macos, linux]
    steps:
      - uses: actions/checkout@v6
      - name: Check out source for packaging scripts
        uses: actions/checkout@v6
        with:
          repository: lyallcooper/magritte
          ref: ${{ env.TAG }}
          token: ${{ secrets.MAGRITTE_SOURCE_TOKEN }}
          path: source
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          merge-multiple: true
          path: source/target/dist
      - name: Render Homebrew formula
        env:
          MAGRITTE_DOWNLOAD_REPOSITORY: ${{ github.repository }}
        run: source/scripts/render-homebrew-formula.sh "${TAG#v}" "$SOURCE_REPOSITORY"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" source/target/dist/*.tar.gz source/target/dist/*.sha256 source/target/dist/magritte.rb --clobber
          else
            gh release create "$TAG" source/target/dist/*.tar.gz source/target/dist/*.sha256 source/target/dist/magritte.rb \
              --title "Magritte $TAG" --notes "Binary release artifacts for Homebrew."
          fi
      - name: Update formula
        run: |
          cp source/target/dist/magritte.rb Formula/magritte.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/magritte.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula unchanged"
          else
            git commit -m "Update Magritte to $TAG"
            git push
          fi
